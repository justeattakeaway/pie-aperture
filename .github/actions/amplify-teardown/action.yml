name: environment-teardown
description: Teardown preview after merge

inputs:
  github-token:
    description: 'The GitHub token for the account that hosts your app'
    required: true
  amplify-app-id:
    description: 'The ID for your app which you can get from the end of its ARN'
    required: true
  aws-region:
    description: 'The AWS region from which to tear down your app'
    required: true
  aws-role-arn:
    description: 'The AWS IAM role ARN to assume for OIDC authentication'
    required: true
  environment-name:
    description: 'GitHub environment name to delete'
    required: true
  branch-name:
    description: 'Amplify "branch" name'
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        role-session-name: github-actions-amplify-teardown-${{ github.run_id }}
        aws-region: ${{ inputs.aws-region }}

    - name: Teardown environment and Amplify branch
      uses: actions/github-script@v7
      env:
        AMPLIFY_APP_ID: ${{ inputs.amplify-app-id }}
        ENV_NAME: ${{ inputs.environment-name }}
        BRANCH_NAME: ${{ inputs.branch-name }}
        AWS_REGION: ${{ inputs.aws-region }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { teardown } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/preview-cleanup/teardown.mjs`);
          const result = await teardown({
            octokit: github,
            exec,
            owner: context.repo.owner,
            repo: context.repo.repo,
            appId: process.env.AMPLIFY_APP_ID,
            envName: process.env.ENV_NAME,
            branchName: process.env.BRANCH_NAME,
            awsRegion: process.env.AWS_REGION,
          });
          if (result.errors.length > 0) {
            core.setFailed(result.errors.join('; '));
          }
