on:
  workflow_call:
    inputs:
      amplify-app-id:
        description: "The ID for your Amplify app (which you can get from the end of its ARN)"
        required: false
        type: string
      build-script:
        description: "The build script used to build the application for Amplify"
        required: false
        default: build
        type: string
      node-version:
        description: "The node version to use when building the application"
        required: true
        type: number
      os:
        description: "The operating system to use when building the application"
        required: true
        type: string
      package-name:
        description: "Name of the application being deployed"
        required: true
        type: string
      package-dist-directory:
        description: "The directory where the package dist is located"
        required: false
        type: string
      bucket-name-preview:
        description: "Name of the preview bucket being deployed to"
        required: false
        type: string
      bucket-name-main:
        description: "Name of the main bucket being deployed to"
        required: false
        type: string
      aws-role-arn:
        description: 'The AWS IAM role ARN to assume for OIDC authentication'
        required: true
        type: string
      deploy:
        description: "Boolean flag on whether to deploy the application with the given node version"
        required: true
        type: boolean

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  AMPLIFY_ID: ${{ inputs.amplify-app-id }}
  AWS_REGION: 'eu-west-1'
  BRANCH_NAME: ${{ github.event_name == 'pull_request' && format('pr{0}', github.event.number) || github.ref == 'refs/heads/main' && 'main' }}
  BUCKET_NAME: ${{ github.event_name == 'pull_request' && inputs.bucket-name-preview || (github.ref == 'refs/heads/main' && inputs.bucket-name-main) }}
  ZIP_NAME: ${{ github.event_name == 'pull_request' && format('{0}-{1}-preview.zip', inputs.package-name, github.event.number) || (github.ref == 'refs/heads/main' && format('{0}-main.zip', inputs.package-name)) }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      # Checkout the Repo
      - name: Checkout
        uses: actions/checkout@v3

      # Detect whether this PR was opened by the test-aperture workflow by
      # looking for metadata trailers in the head commit message. Gated on
      # the PR author being our GitHub App so regular pie-aperture PRs
      # (human, dependabot, renovate) skip this entirely and can't regress
      # on a GitHub API hiccup.
      - name: Check for PIE PR metadata
        id: pie-meta
        if: |
          github.event_name == 'pull_request' && inputs.deploy == true &&
          github.event.pull_request.user.login == 'pie-design-system-app[bot]'
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.HEAD_SHA,
            });
            const msg = commit.commit.message || '';
            const numMatch = msg.match(/^pie-pr-number:\s*(\d+)\s*$/m);
            const shaMatch = msg.match(/^pie-pr-sha:\s*([a-f0-9]+)\s*$/m);
            if (numMatch && shaMatch) {
              core.setOutput('present', 'true');
              core.setOutput('pie-pr-number', numMatch[1]);
              core.setOutput('pie-pr-sha', shaMatch[1]);
            } else {
              core.setOutput('present', 'false');
            }

      - name: Generate GH App token for PIE
        id: pie-app-token
        if: steps.pie-meta.outputs.present == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: justeattakeaway
          repositories: pie

      # Create an in_progress deployment on the PIE PR so the aperture preview surfaces natively in PIE's Deployments UI
      - name: Create in_progress PIE deployment
        id: pie-deploy
        if: steps.pie-meta.outputs.present == 'true'
        uses: actions/github-script@v7
        env:
          PIE_PR_SHA: ${{ steps.pie-meta.outputs.pie-pr-sha }}
          APERTURE_PR_NUMBER: ${{ github.event.number }}
          PACKAGE_NAME: ${{ inputs.package-name }}
        with:
          github-token: ${{ steps.pie-app-token.outputs.token }}
          script: |
            const pkg = process.env.PACKAGE_NAME;
            const environment = `aperture-${pkg}`;
            const environmentUrl = `https://pr${process.env.APERTURE_PR_NUMBER}-aperture-${pkg}.pie.design/`;
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: 'justeattakeaway',
              repo: 'pie',
              ref: process.env.PIE_PR_SHA,
              environment,
              required_contexts: [],
              auto_merge: false,
              transient_environment: true,
              description: `Aperture ${pkg} preview`,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: 'justeattakeaway',
              repo: 'pie',
              deployment_id: deployment.id,
              state: 'in_progress',
              environment_url: environmentUrl,
              log_url: logUrl,
            });

            core.setOutput('deployment-id', deployment.id);
            core.setOutput('environment-url', environmentUrl);

      # Configure AWS credentials using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ inputs.aws-role-arn }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Dependencies
        shell: bash
        run: yarn

      - name: Build - ${{ inputs.package-name }}
        shell: bash
        run: yarn ${{ inputs.build-script }} --filter="${{ inputs.package-name }}"

      # This is a slightly modified version of the following workflow - https://github.com/justeattakeaway/pie/blob/main/.github/workflows/amplify-deploy.yml
      # Create Github Deployment
      - name: Create ${{ inputs.package-name }} GitHub deployment
        if: github.event_name == 'pull_request' && inputs.deploy == true
        uses: chrnorm/deployment-action@v2
        id: deploy
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: "${{ inputs.package-name}}-pr-${{ github.event.number }}"

      # Zip dist folder
      - name: Zip build output
        if: inputs.deploy == true
        shell: bash
        run: |
          cd ${{ inputs.package-dist-directory }}
          zip -r ./${{ env.ZIP_NAME }} .

      # Upload zip to S3 using AWS CLI
      - name: Upload to S3
        if: inputs.deploy == true
        id: upload-s3
        shell: bash
        run: |
          cd ${{ inputs.package-dist-directory }}
          
          # Upload file to S3 with public-read ACL
          aws s3 cp ./${{ env.ZIP_NAME }} s3://${{ env.BUCKET_NAME }}/${{ env.ZIP_NAME }} \
            --content-type "application/zip" \
            --acl public-read \
            --region ${{ env.AWS_REGION }}
          
          # Construct the public URL
          FILE_URL="https://${{ env.BUCKET_NAME }}.s3.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ZIP_NAME }}"
          echo "file-url=$FILE_URL" >> "$GITHUB_OUTPUT"
          echo "Uploaded to: $FILE_URL"

      # Create branch on Amplify
      - name: Create Amplify branch
        if: inputs.deploy == true
        shell: bash
        # We return true to prevent the step from failing if the branch already exists
        run: |
          aws amplify create-branch \
            --app-id ${{ env.AMPLIFY_ID }} \
            --branch-name ${{ env.BRANCH_NAME }} \
            || true

      # Deploy Amplify from S3
      - name: Deploy Amplify from S3
        if: inputs.deploy
        shell: bash
        run: |
          aws amplify start-deployment \
            --app-id ${{ env.AMPLIFY_ID }} \
            --branch-name ${{ env.BRANCH_NAME }} \
            --source-url https://${{ env.BUCKET_NAME }}.s3.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ZIP_NAME }}
      # Set env vars for domain name association
      - name: Set environment variables for domain name association
        if: github.event_name == 'pull_request' && inputs.deploy
        run: |
          PACKAGE_NAME_SUFFIX=$(echo "${{ inputs.package-name }}" | sed -e 's/^-app//')
          echo "SUB_DOMAIN=pr${{ github.event.number }}-aperture-$PACKAGE_NAME_SUFFIX" >> $GITHUB_ENV

      - name: Get existing domain associations
        if: github.event_name == 'pull_request' && inputs.deploy
        run: |
          DOMAIN_ASSOCIATIONS=$(aws amplify get-domain-association \
            --app-id ${{ env.AMPLIFY_ID }} \
            --domain-name pie.design \
            --region ${{ env.AWS_REGION }} \
            | jq '
              [.domainAssociation.subDomains[].subDomainSetting | { prefix: (.prefix // ""), branchName }] |
              . |= (map(.branchName) | index("pr${{ github.event.number }}")) as $ix |
              if $ix == null then
                . + [{branchName: "pr${{ github.event.number }}", prefix: "${{ env.SUB_DOMAIN }}"}]
              else . end
            ' -c)
          echo "DOMAIN_ASSOCIATIONS=$DOMAIN_ASSOCIATIONS" >> $GITHUB_ENV
      - name: Create Subdomain Association
        if: github.event_name == 'pull_request' && inputs.deploy
        shell: bash
        run: |
          aws amplify update-domain-association \
            --app-id ${{ env.AMPLIFY_ID }} \
            --domain-name pie.design \
            --sub-domain-settings '${{ env.DOMAIN_ASSOCIATIONS }}'


      - name: Wait for Amplify deployment
        if: github.event_name == 'pull_request' && inputs.deploy
        run: |
          LATEST_JOB_ID=$(aws amplify list-jobs \
            --app-id ${{ env.AMPLIFY_ID }} \
            --branch-name ${{ env.BRANCH_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query jobSummaries[0].jobId \
            --output text)
          MAX_ATTEMPTS=12
          SLEEP_SECONDS=10

          attempt_counter=0
          status=""

          while [ $attempt_counter -lt $MAX_ATTEMPTS ]; do
            status=$(aws amplify get-job \
              --app-id ${{ env.AMPLIFY_ID }} \
              --branch-name ${{ env.BRANCH_NAME }} \
              --job-id $LATEST_JOB_ID \
              --query job.summary.status \
              --output text)
            echo "Attempt $(( attempt_counter+1 )) of $MAX_ATTEMPTS: Status - $status"

            if [ "$status" == "SUCCEED" ]; then
              echo "Amplify deployment succeeded."
              break
            fi

            if [ "$status" == "FAILED" ]; then
              echo "Amplify deployment failed."
              exit 1
            fi

            let "attempt_counter+=1"
            sleep $SLEEP_SECONDS
          done

          if [ "$status" != "SUCCEED" ]; then
            echo "Amplify deployment did not succeed within the expected time."
            exit 1
          fi

      # If successful
      - name: Update deployment status (success)
        if: github.event_name == 'pull_request' && inputs.deploy && success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment-url: https://${{ env.SUB_DOMAIN }}.pie.design/
          deployment-id: ${{ steps.deploy.outputs.deployment_id }}
          state: "success"

      # If it failed
      - name: Update deployment status (failure)
        if: github.event_name == 'pull_request' && inputs.deploy && failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment-url: https://${{ env.SUB_DOMAIN }}.pie.design/
          deployment-id: ${{ steps.deploy.outputs.deployment_id }}
          state: "failure"

      - name: Update PIE deployment status (success)
        if: steps.pie-meta.outputs.present == 'true' && github.event_name == 'pull_request' && inputs.deploy && success()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.pie-deploy.outputs.deployment-id }}
          ENVIRONMENT_URL: ${{ steps.pie-deploy.outputs.environment-url }}
        with:
          github-token: ${{ steps.pie-app-token.outputs.token }}
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: 'justeattakeaway',
              repo: 'pie',
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'success',
              environment_url: process.env.ENVIRONMENT_URL,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Update PIE deployment status (failure)
        if: steps.pie-meta.outputs.present == 'true' && github.event_name == 'pull_request' && inputs.deploy && failure()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.pie-deploy.outputs.deployment-id }}
          ENVIRONMENT_URL: ${{ steps.pie-deploy.outputs.environment-url }}
        with:
          github-token: ${{ steps.pie-app-token.outputs.token }}
          script: |
            if (!process.env.DEPLOYMENT_ID) return;
            await github.rest.repos.createDeploymentStatus({
              owner: 'justeattakeaway',
              repo: 'pie',
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'failure',
              environment_url: process.env.ENVIRONMENT_URL,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
