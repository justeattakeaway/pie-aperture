name: Build - Nuxt App

on:
  pull_request:
    types: [opened, synchronize, reopened, "ready_for_review"]
    paths:
      - '.github/workflows/**'
      - 'nuxt-app/**'
      - 'webdriver-helpers/**'
      - 'wdio.conf.js'
      - 'test/**'
      - 'playwright-helpers/**'
      - '.percy.yml'
      - 'package.json'
      - 'yarn.lock'

  push:
    branches:
      - main

concurrency:
  group: CI-Nuxt-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:

  build-nuxt-app-windows-node20:
    name: Windows - Node 20
    uses: ./.github/workflows/build.yml
    with:
        build-script: 'generate'
        deploy: false
        node-version: 20
        os: 'windows-latest'
        package-name: 'nuxt-app'
        aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
    secrets: inherit

  build-deploy-nuxt-app-ubuntu-node20:
      name: Ubuntu - Node 20
      uses: ./.github/workflows/build.yml
      with:
          build-script: 'generate'
          deploy: true
          node-version: 20
          os: 'ubuntu-latest'
          amplify-app-id: 'd36dan3bxjue8c'
          package-name: 'nuxt-app'
          package-dist-directory: './nuxt-app/.output/public'
          bucket-name-preview: 'pie-aperture-preview'
          bucket-name-main: 'pie-aperture'
          aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      secrets: inherit

  system-tests:
    needs: 'build-deploy-nuxt-app-ubuntu-node20'
    name: Run System Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install Dependencies
        shell: bash
        run: yarn

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run SSR Tests
        shell: bash
        run: yarn test:ssr --filter=nuxt-app

      - name: Run System Tests
        shell: bash
        run: yarn test:system --filter=nuxt-app

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: nuxt-playwright-report
          path: playwright-reports/nuxt-app-playwright-report/
          retention-days: 7
    env:
      NUXT_AMPLIFY_ID: d36dan3bxjue8c
      PR_NUMBER: ${{ github.event.number }}

  percy-tests:
    needs: 'build-deploy-nuxt-app-ubuntu-node20'
    if: (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || github.ref == 'refs/heads/main'
    name: Run Percy Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install Dependencies
        shell: bash
        run: yarn

      - name: Run Percy Tests
        shell: bash
        run: yarn test:visual --filter=nuxt-app
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      PERCY_TOKEN_PIE_APERTURE_NUXT: ${{ secrets.PERCY_TOKEN_PIE_APERTURE_NUXT }}
      NUXT_AMPLIFY_ID: d36dan3bxjue8c
      PR_NUMBER: ${{ github.event.number }}

  chromatic-tests:
    needs: 'build-deploy-nuxt-app-ubuntu-node20'
    if: (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || github.ref == 'refs/heads/main'
    name: Run Chromatic Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install Dependencies
        shell: bash
        run: yarn

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run Chromatic Tests
        shell: bash
        run: yarn test:visual:chromatic --filter=nuxt-app

      - name: Upload Chromatic Results
        shell: bash
        run: npx chromatic --playwright --exit-zero-on-changes -t=${CHROMATIC_PROJECT_TOKEN}
    env:
      CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
      CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
      CHROMATIC_SLUG: ${{ github.repository }}
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN_NUXT }}
      NUXT_AMPLIFY_ID: d36dan3bxjue8c
      PR_NUMBER: ${{ github.event.number }}
