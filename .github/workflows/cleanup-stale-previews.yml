name: Cleanup Stale Preview Branches

on:
  schedule:
    - cron: '0 2 1,15 * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  deployments: write
  pull-requests: write

concurrency:
  group: cleanup-stale-previews
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-amplify-cleanup-${{ github.run_id }}
          aws-region: eu-west-1

      - name: Run cleanup
        id: run-cleanup
        env:
          AMPLIFY_CUTOFF_DAYS: ${{ vars.AMPLIFY_CUTOFF_DAYS }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { run } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/preview-cleanup/index.mjs`);
            return await run({ github, context, core, exec });

      - name: Fail if any deletion failed
        if: ${{ fromJSON(steps.run-cleanup.outputs.result).failed > 0 }}
        run: |
          echo "One or more branch deletions failed. See step summary for details."
          exit 1
